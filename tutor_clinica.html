<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PetCare - Bem-vindo</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


  <!-- CSS customizado -->
  <link rel="stylesheet" href="assets/css/tutor_clinica.css"/>
  <!-- Adicione isso no <head> -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
  <!-- Fundo com imagens -->
  <div class="background-container">
    <div class="bg-left"></div>
    <div class="bg-right"></div>
  </div>

  <!-- Card com animação -->
  <div class="content-card card shadow-lg text-center animate-card">
    <div class="card-body p-5">
      <h1 class="card-title fs-2 mb-3">BEM-VINDO!</h1>
      <p class="card-text fs-5 mb-4">Escolha uma das opções para atendermos melhor o seu desejo.</p>
      <div class="button-wrapper">
        <div class="wrap-login100-form-btn">
            <div class="login100-form-bgbtn"></div>
            <i class="fa-solid fa-dog icon icon-tutor"></i>
            <button class="login100-form-btn btn-tutor">
              TUTOR
            </button>
          </div>
          
          <div class="wrap-login100-form-btn">
            <div class="login100-form-bgbtn"></div>
            <i class="fa-solid fa-user-doctor icon icon-clinic"></i>
            <button class="login100-form-btn btn-clinic">
              CLÍNICA / PETSHOP
            </button>
          </div>
      </div>
    </div>
  </div>
</body>
</html>
