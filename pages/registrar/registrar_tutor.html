<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrar-se Pet Connect</title>

  <link rel="icon" type="image/png" href="/assets/img/pata.ico" />

  <!-- Links para seus CSS externos e ícones -->
  <link rel="stylesheet" href="/login/fonts/font-awesome-4.7.0/css/font-awesome.min.css" />
  <link rel="stylesheet" href="/login/fonts/iconic/css/material-design-iconic-font.min.css" />
  <link rel="stylesheet" href="/login/vendor/animate/animate.css" />
  <link rel="stylesheet" href="/login/vendor/css-hamburgers/hamburgers.min.css" />
  <link rel="stylesheet" href="/login/vendor/animsition/css/animsition.min.css" />
  <link rel="stylesheet" href="/login/vendor/select2/select2.min.css" />
  <link rel="stylesheet" href="/login/vendor/daterangepicker/daterangepicker.css" />
  <link rel="stylesheet" href="/login/css/util.css" />
  <link rel="stylesheet" href="/login/css/main.css" />

  <!-- Seu CSS customizado -->
  <link rel="stylesheet" href="/assets/css/registrar_tutor.css" />
</head>

<body>
  <div class="container-login100">
    <div class="wrap-login100">
      <form class="login100-form validate-form" method="POST" action="/rota-para-cadastro">
        <span class="login100-form-title p-b-49">Criar uma nova conta</span>

        <div class="wrap-input100 validate-input" data-validate="O nome é obrigatório">
          <span class="label-input100">Nome</span>
          <input class="input100" type="text" name="nome" placeholder="Digite seu nome completo" required />
        </div>

        <div class="wrap-input100 validate-input" data-validate="O email é obrigatório">
          <span class="label-input100">Email</span>
          <input class="input100" type="email" name="email" placeholder="Digite seu Email" required />
        </div>

        <div class="wrap-input100 validate-input" data-validate="O telefone é obrigatório">
          <span class="label-input100">Telefone</span>
          <input class="input100" type="tel" name="telefone" placeholder="Digite seu telefone" required />
        </div>

        <div class="wrap-input100 validate-input" data-validate="O gênero é obrigatório">
          <span class="label-input100">Gênero</span>
          <select class="input100" name="genero" required>
            <option value="" disabled selected>Escolha seu gênero</option>
            <option value="masculino">Masculino</option>
            <option value="feminino">Feminino</option>
            <option value="outro">Outro</option>
          </select>
        </div>

        <div class="wrap-input100 validate-input" data-validate="A senha é obrigatória">
          <span class="label-input100">Senha</span>
          <input class="input100" type="password" name="senha" placeholder="Digite sua senha" required />
        </div>

        <div class="wrap-input100 validate-input" data-validate="Confirmação de senha obrigatória">
          <span class="label-input100">Confirmar senha</span>
          <input class="input100" type="password" name="confirmar_senha" placeholder="Confirme sua senha" required />
        </div>

        <div class="container-login100-form-btn">
          <button type="submit" class="login100-form-btn">Cadastre-se</button>
        </div>

        <div class="txt1 text-center p-t-54 p-b-20">
          <span>Ou registre-se usando</span>
        </div>

        <div class="flex-c-m">
          <a href="#" class="login100-social-item bg1"><i class="fa fa-facebook"></i></a>
          <a href="#" class="login100-social-item bg2"><i class="fa fa-twitter"></i></a>
          <a href="#" class="login100-social-item bg3"><i class="fa fa-google"></i></a>
        </div>

        <br /><br />
        <div class="container-login100-form-btn">
          <a href="/home.html" class="login100-form-btn">Botão dev</a>
        </div>
      </form>
    </div>

    <div class="image-container"></div>
  </div>

  <!-- Scripts JS -->
  <script src="/login/vendor/jquery/jquery-3.2.1.min.js"></script>
  <script src="/login/vendor/animsition/js/animsition.min.js"></script>
  <script src="/login/vendor/bootstrap/js/popper.js"></script>
  <script src="/login/vendor/bootstrap/js/bootstrap.min.js"></script>
  <script src="/login/vendor/select2/select2.min.js"></script>
  <script src="/login/vendor/daterangepicker/moment.min.js"></script>
  <script src="/login/vendor/daterangepicker/daterangepicker.js"></script>
  <script src="/login/vendor/countdowntime/countdowntime.js"></script>
  <script src="/assets/js/main.js"></script>
</body>

</html>
